spring.application.name=brofurs
# =============================================
# BroFurs Application Properties
# =============================================
 
# Server
server.port=8080
server.error.path=/error
 
 
# =============================================
# Database Configuration (MySQL)
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/brofurs
spring.datasource.username=root
spring.datasource.password=0000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
# Connection pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
 
# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
 
# =============================================
# Thymeleaf
# =============================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
 
# =============================================
# File Upload
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
 
# Upload directory (relative to project root or absolute path)
app.upload.dir=uploads
app.upload.max-size=10485760
 
# =============================================
# Logging
# =============================================
logging.level.com.brofurs.brofurs=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
 
# =============================================
# Session
# =============================================
server.servlet.session.timeout=30m