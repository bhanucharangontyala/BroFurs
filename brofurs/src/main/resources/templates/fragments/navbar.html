<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav th:fragment="navbar"
     class="navbar navbar-expand-lg navbar-furnicraft sticky-top">
    <div class="container">

        <!-- Brand -->
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-house-heart-fill me-1"></i>Bro<span>Furs</span>
        </a>

        <!-- Toggler -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Nav Links -->
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <!-- HOME -->
                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/}">
                        Home
                    </a>
                </li>

                <!-- PRODUCTS -->
                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/products}">
                        Products
                    </a>
                </li>

                <!-- CATEGORIES -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        Categories
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/products(categoryId=1)}">Beds</a></li>
                        <li><a class="dropdown-item" th:href="@{/products(categoryId=2)}">Shelves</a></li>
                        <li><a class="dropdown-item" th:href="@{/products(categoryId=3)}">Windows</a></li>
                        <li><a class="dropdown-item" th:href="@{/products(categoryId=4)}">Doors</a></li>
                        <li><a class="dropdown-item" th:href="@{/products(categoryId=5)}">Cupboards</a></li>
                        <li><a class="dropdown-item" th:href="@{/products(categoryId=6)}">Others</a></li>
                    </ul>
                </li>

            </ul>

            <!-- RIGHT SIDE -->
            <ul class="navbar-nav ms-auto align-items-center gap-1">

                <!-- NOT LOGGED IN -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/login}">
                        <i class="bi bi-person me-1"></i>Login
                    </a>
                </li>

                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn-nav-cta nav-link" th:href="@{/register}">
                        Register
                    </a>
                </li>

                <!-- USER -->
                <li class="nav-item dropdown" sec:authorize="hasRole('USER')">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">User</span>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/user/dashboard}">My Dashboard</a></li>
                        <li><a class="dropdown-item" th:href="@{/user/orders}">My Orders</a></li>
                        <li><a class="dropdown-item" th:href="@{/user/appointments}">Appointments</a></li>
                        <li><hr class="dropdown-divider"/></li>

                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger">
                                    Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>

                <!-- ADMIN -->
                <li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        Admin
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/admin/dashboard}">Dashboard</a></li>
                        <li><hr class="dropdown-divider"/></li>

                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger">
                                    Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>

            </ul>
        </div>
    </div>
</nav>

</body>
</html>
