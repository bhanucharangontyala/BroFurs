<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="messages">
    <div class="container mt-3">
        <div th:if="${successMessage}" class="alert-fc-success alert-auto-dismiss d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert-fc-error alert-auto-dismiss d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${errorMessage}"></span>
        </div>
        <div th:if="${infoMessage}" class="alert-fc-info alert-auto-dismiss d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-info-circle-fill"></i>
            <span th:text="${infoMessage}"></span>
        </div>
        <!-- Spring Security redirect messages -->
        <div th:if="${param.error}" class="alert-fc-error alert-auto-dismiss d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span>Invalid email or password. Please try again.</span>
        </div>
        <div th:if="${param.logout}" class="alert-fc-success alert-auto-dismiss d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-check-circle-fill"></i>
            <span>You have been logged out successfully.</span>
        </div>
        <div th:if="${param.success}" class="alert-fc-success alert-auto-dismiss d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-check-circle-fill"></i>
            <span>Operation completed successfully.</span>
        </div>
    </div>
</div>
</body>
</html>
