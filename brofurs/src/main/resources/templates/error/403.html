<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::title}, ~{::main})}">
<head><title>Access Denied</title></head>
<body>
<main>
<section class="error-page">
    <div class="container text-center py-5">
        <div class="error-icon"><i class="bi bi-shield-lock"></i></div>
        <h1 class="error-code">403</h1>
        <h2 class="mb-3">Access Denied</h2>
        <p class="text-fc-muted mb-4 error-copy">
            You do not have permission to view this page. Please log in with an appropriate account.
        </p>
        <div class="d-flex justify-content-center gap-3 flex-wrap">
            <a th:href="@{/}" class="btn-fc-primary btn px-4">
                <i class="bi bi-house me-2"></i>Go Home
            </a>
            <a th:href="@{/login}" class="btn-fc-outline btn px-4">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </a>
        </div>
    </div>
</section>
</main>
</body>
</html>
