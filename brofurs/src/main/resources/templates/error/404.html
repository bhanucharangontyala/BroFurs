<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::title}, ~{::main})}">
<head><title>Page Not Found</title></head>
<body>
<main>
<section class="error-page">
    <div class="container text-center py-5">
        <div class="error-icon"><i class="bi bi-house-x"></i></div>
        <h1 class="error-code">404</h1>
        <h2 class="mb-3">Page Not Found</h2>
        <p class="text-fc-muted mb-4 error-copy">
            The page you are looking for does not exist or may have been moved. Use the links below to continue browsing.
        </p>
        <div class="d-flex justify-content-center gap-3 flex-wrap">
            <a th:href="@{/}" class="btn-fc-primary btn px-4">
                <i class="bi bi-house me-2"></i>Go Home
            </a>
            <a th:href="@{/products}" class="btn-fc-outline btn px-4">
                <i class="bi bi-grid me-2"></i>Browse Products
            </a>
        </div>
    </div>
</section>
</main>
</body>
</html>
