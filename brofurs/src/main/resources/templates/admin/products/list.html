<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin :: adminLayout(~{::title}, ~{::main})}">
<head><title>Products</title></head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1">Products</h2>
            <p class="text-fc-muted small mb-0">Manage your furniture catalogue</p>
        </div>
        <a th:href="@{/admin/products/new}" class="btn-fc-primary btn">
            <i class="bi bi-plus-lg me-1"></i>Add Product
        </a>
    </div>

    <div class="admin-table-card">
        <div class="admin-table-header">
            <h5><i class="bi bi-box-seam me-2"></i>All Products</h5>
            <span class="badge" style="background:var(--fc-sand);color:var(--fc-brown-dark);"
                  th:text="${#lists.size(products)} + ' products'">0</span>
        </div>
        <div class="table-responsive">
            <table class="table admin-table mb-0">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Base Price</th>
                        <th>Stock</th>
                        <th>Custom Size</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="8" class="text-center text-fc-muted py-4">No products found.</td>
                    </tr>
                    <tr th:each="product : ${products}">
                        <td>
                            <img th:if="${product.primaryImage != null}"
                                 th:src="@{${product.primaryImage.imagePath}}"
                                 th:alt="${product.name}"
                                 style="width:50px;height:50px;object-fit:cover;border-radius:8px;border:1px solid var(--fc-border);"/>
                            <div th:unless="${product.primaryImage != null}"
                                 style="width:50px;height:50px;border-radius:8px;background:var(--fc-sand);display:flex;align-items:center;justify-content:center;">
                                🪑
                            </div>
                        </td>
                        <td>
                            <strong th:text="${product.name}">Name</strong>
                            <div class="text-fc-muted" style="font-size:0.75rem;"
                                 th:text="${product.slug}">slug</div>
                        </td>
                        <td th:text="${product.category.name}">Category</td>
                        <td class="fw-600">₹<span th:text="${#numbers.formatDecimal(product.basePrice, 0, 'COMMA', 0, 'POINT')}">0</span></td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="${product.stockStatus.name() == 'IN_STOCK'} ? 'badge-in-stock' :
                                                  (${product.stockStatus.name() == 'OUT_OF_STOCK'} ? 'badge-out-of-stock' : 'badge-made-to-order')"
                                  th:text="${product.stockStatus.displayName}">Stock</span>
                        </td>
                        <td>
                            <i th:if="${product.customSizeAllowed}" class="bi bi-check-circle-fill text-success"></i>
                            <i th:unless="${product.customSizeAllowed}" class="bi bi-x-circle text-fc-muted"></i>
                        </td>
                        <td>
                            <span th:if="${product.active}" class="badge badge-in-stock">Active</span>
                            <span th:unless="${product.active}" class="badge badge-out-of-stock">Inactive</span>
                        </td>
                        <td>
                            <div class="d-flex gap-1">
                                <a th:href="@{/products/{slug}(slug=${product.slug})}"
                                   class="btn btn-sm btn-outline-secondary" target="_blank"
                                   data-bs-toggle="tooltip" title="View on site">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/admin/products/edit/{id}(id=${product.id})}"
                                   class="btn btn-sm btn-fc-outline">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/admin/products/delete/{id}(id=${product.id})}"
                                      method="post" th:id="|delProd_${product.id}|">
                                    <button type="button" class="btn btn-sm btn-danger"
                                            onclick="confirmDelete('delProd_[[${product.id}]]', '[[${product.name}]]')">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
