<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin :: adminLayout(~{::title}, ~{::main})}">
<head><title>Categories</title></head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1">Categories</h2>
            <p class="text-fc-muted small mb-0">Manage furniture categories</p>
        </div>
        <a th:href="@{/admin/categories/new}" class="btn-fc-primary btn">
            <i class="bi bi-plus-lg me-1"></i>Add Category
        </a>
    </div>

    <div class="admin-table-card">
        <div class="admin-table-header">
            <h5><i class="bi bi-grid-3x3-gap me-2"></i>All Categories</h5>
            <span class="badge" style="background:var(--fc-sand);color:var(--fc-brown-dark);"
                  th:text="${#lists.size(categories)} + ' total'">0 total</span>
        </div>
        <div class="table-responsive">
            <table class="table admin-table mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(categories)}">
                        <td colspan="5" class="text-center text-fc-muted py-4">No categories found.</td>
                    </tr>
                    <tr th:each="cat, stat : ${categories}">
                        <td th:text="${stat.count}">1</td>
                        <td><strong th:text="${cat.name}">Category</strong></td>
                        <td class="text-fc-muted" th:text="${cat.description ?: '—'}">—</td>
                        <td>
                            <span th:if="${cat.active}" class="badge badge-in-stock">Active</span>
                            <span th:unless="${cat.active}" class="badge badge-out-of-stock">Inactive</span>
                        </td>
                        <td>
                            <div class="d-flex gap-2">
                                <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}"
                                   class="btn btn-sm btn-fc-outline">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/admin/categories/delete/{id}(id=${cat.id})}"
                                      method="post" th:id="|delCat_${cat.id}|">
                                    <button type="button" class="btn btn-sm btn-danger"
                                            onclick="confirmDelete('delCat_[[${cat.id}]]', '[[${cat.name}]]')">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
