<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin :: adminLayout(~{::title}, ~{::main})}">
<head><title th:text="${isNew} ? 'New Wood Type' : 'Edit Wood Type'">Wood Type</title></head>
<body>
<main>
    <div class="mb-4">
        <h2 class="mb-1" th:text="${isNew} ? 'New Wood Type' : 'Edit Wood Type'">Wood Type</h2>
        <p class="text-fc-muted small mb-0">
            <a th:href="@{/admin/wood-types}"><i class="bi bi-arrow-left me-1"></i>Back to Wood Types</a>
        </p>
    </div>

    <div class="fc-form-card" style="max-width:600px;">
        <form th:action="@{/admin/wood-types/save}" th:object="${woodType}" method="post">
            <input type="hidden" th:field="*{id}"/>

            <div class="mb-3">
                <label class="form-label">Wood Type Name <span class="text-danger">*</span></label>
                <input type="text" th:field="*{name}" class="form-control"
                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                       placeholder="e.g. Teak, Neem, Mango"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea th:field="*{description}" class="form-control" rows="3"
                          placeholder="Brief description of this wood type"></textarea>
            </div>

            <div class="mb-4">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" th:field="*{active}" id="activeToggle"/>
                    <label class="form-check-label" for="activeToggle">Active</label>
                </div>
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn-fc-primary btn px-4">
                    <i class="bi bi-check-lg me-1"></i>
                    <span th:text="${isNew} ? 'Create Wood Type' : 'Update Wood Type'">Save</span>
                </button>
                <a th:href="@{/admin/wood-types}" class="btn-fc-outline btn px-4">Cancel</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
