<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin :: adminLayout(~{::title}, ~{::main})}">
<head><title>Wood Types</title></head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1">Wood Types</h2>
            <p class="text-fc-muted small mb-0">Manage available wood types and their details</p>
        </div>
        <a th:href="@{/admin/wood-types/new}" class="btn-fc-primary btn">
            <i class="bi bi-plus-lg me-1"></i>Add Wood Type
        </a>
    </div>

    <div class="admin-table-card">
        <div class="admin-table-header">
            <h5><i class="bi bi-tree me-2"></i>All Wood Types</h5>
        </div>
        <div class="table-responsive">
            <table class="table admin-table mb-0">
                <thead>
                    <tr><th>#</th><th>Name</th><th>Description</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(woodTypes)}">
                        <td colspan="5" class="text-center text-fc-muted py-4">No wood types found.</td>
                    </tr>
                    <tr th:each="wt, stat : ${woodTypes}">
                        <td th:text="${stat.count}">1</td>
                        <td><strong th:text="${wt.name}">Wood</strong></td>
                        <td class="text-fc-muted" th:text="${wt.description ?: '—'}">—</td>
                        <td>
                            <span th:if="${wt.active}" class="badge badge-in-stock">Active</span>
                            <span th:unless="${wt.active}" class="badge badge-out-of-stock">Inactive</span>
                        </td>
                        <td>
                            <div class="d-flex gap-2">
                                <a th:href="@{/admin/wood-types/edit/{id}(id=${wt.id})}"
                                   class="btn btn-sm btn-fc-outline"><i class="bi bi-pencil"></i></a>
                                <form th:action="@{/admin/wood-types/delete/{id}(id=${wt.id})}"
                                      method="post" th:id="|delWt_${wt.id}|">
                                    <button type="button" class="btn btn-sm btn-danger"
                                            onclick="confirmDelete('delWt_[[${wt.id}]]', '[[${wt.name}]]')">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
