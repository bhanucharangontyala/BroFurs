<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="adminLayout(title, content)">
<head th:replace="~{fragments/header :: head}"></head>
<body class="admin-page-body">

<nav class="navbar navbar-furnicraft admin-topbar">
    <div class="container-fluid px-3">
        <span class="navbar-brand mb-0 h1"><i class="bi bi-shield-lock me-2"></i>BroFurs Admin</span>
        <div class="d-flex align-items-center gap-3">
            <span class="admin-topbar-user">
                <i class="bi bi-person-circle me-1"></i><span sec:authentication="name">Admin</span>
            </span>
            <a th:href="@{/}" class="admin-topbar-link">
                <i class="bi bi-globe me-1"></i>View Site
            </a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-sm admin-topbar-btn">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="admin-wrapper">
    <div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>
    <div class="admin-content">
        <div th:replace="~{fragments/messages :: messages}"></div>
        <div th:replace="${content}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
