<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin :: adminLayout(~{::title}, ~{::main})}">
<head><title>Appointments</title></head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1">Appointments</h2>
            <p class="text-fc-muted small mb-0">Manage customer site visit requests</p>
        </div>
    </div>

    <div class="admin-table-card">
        <div class="admin-table-header">
            <h5><i class="bi bi-calendar-check me-2"></i>Appointment Requests</h5>
            <span class="badge" style="background:var(--fc-sand);color:var(--fc-brown-dark);"
                  th:text="${#lists.size(appointments)} + ' requests'">0</span>
        </div>
        <div class="table-responsive">
            <table class="table admin-table mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Customer</th>
                        <th>Phone</th>
                        <th>Product Interest</th>
                        <th>Preferred Date</th>
                        <th>Preferred Time</th>
                        <th>Message</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(appointments)}">
                        <td colspan="9" class="text-center text-fc-muted py-4">No appointments yet.</td>
                    </tr>
                    <tr th:each="appt, stat : ${appointments}">
                        <td th:text="${stat.count}">1</td>
                        <td>
                            <strong th:text="${appt.customerName}">Name</strong>
                            <div class="text-fc-muted" style="font-size:0.75rem;"
                                 th:if="${appt.user != null}"
                                 th:text="${appt.user.email}">email</div>
                        </td>
                        <td th:text="${appt.phone ?: '—'}">Phone</td>
                        <td>
                            <span th:if="${appt.product != null}" th:text="${appt.product.name}">Product</span>
                            <span th:unless="${appt.product != null}" class="text-fc-muted">General Visit</span>
                        </td>
                        <td th:text="${appt.preferredDate != null ? #temporals.format(appt.preferredDate, 'dd MMM yyyy') : '—'}">Date</td>
                        <td th:text="${appt.preferredTime != null ? #temporals.format(appt.preferredTime, 'hh:mm a') : '—'}">Time</td>
                        <td>
                            <span th:if="${appt.message != null}"
                                  th:text="${#strings.abbreviate(appt.message, 40)}"
                                  data-bs-toggle="tooltip" th:title="${appt.message}">—</span>
                            <span th:unless="${appt.message != null}" class="text-fc-muted">—</span>
                        </td>
                        <td>
                            <span class="status-badge"
                                  th:classappend="|status-${appt.status.name()}|"
                                  th:text="${appt.status.displayName}">Status</span>
                        </td>
                        <td>
                            <form th:action="@{/admin/appointments/{id}/status(id=${appt.id})}"
                                  method="post" class="d-flex gap-1">
                                <select name="status" class="form-select form-select-sm" style="width:130px;">
                                    <option th:each="s : ${statuses}"
                                            th:value="${s.name()}"
                                            th:text="${s.displayName}"
                                            th:selected="${s == appt.status}">Status</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-fc-outline">
                                    <i class="bi bi-check"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
